name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validations:
    name: Run shared validations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Execute CI validations
        run: bash cicd/scripts/run-validations.sh cicd/config/validation-config.yml
