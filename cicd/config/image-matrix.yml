# Shared image build contract for local runners and GitHub Actions shims.
# An empty image list is valid and should warn while exiting successfully.
version: 1
defaults:
  build_mode: validation-only
  publish_enabled: false
  deploy_enabled: false
# Future Docker Hub publish contract (currently disabled):
# - Source of truth for publish image naming remains this file's images[].tag field.
# - Future workflow input: dockerhub_namespace
# - Future workflow input: dockerhub_repository_prefix (optional)
# - Future secrets: DOCKERHUB_USERNAME and DOCKERHUB_TOKEN
# - Future login location: .github/workflows/cd.yml publish job before invoking publish logic.
images: []
