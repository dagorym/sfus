# Shared validation contract for Linux runners and GitHub Actions shims.
# Commands are declared once as bash-oriented repo-root commands.
# Empty command slots are valid and should produce warnings, not failures.
version: 1
defaults:
  warn_on_missing_command: true
  execution_shell: bash
validations:
  - id: repo-structure-contract
    description: Verify CI/CD assets stay under cicd/ and workflows remain thin entrypoints.
    command: "test -f cicd/config/validation-config.yml && test -f cicd/config/image-matrix.yml"
  - id: local-parity-contract
    description: Verify Linux validation and image workflows read the shared cicd/config inputs.
    command: ""
