services:
  mysql:
    image: mysql:5.7.44
    container_name: sfus-mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?set in .env}
      MYSQL_USER: ${MYSQL_USER:?set in .env}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set in .env}
    volumes:
      - sfus_mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    profiles: ["fullstack"]
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: sfus-api-dev
    env_file:
      - ../../apps/api/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3001:3001"

  web:
    profiles: ["fullstack"]
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: sfus-web-dev
    env_file:
      - ../../apps/web/.env
    environment:
      WEB_API_INTERNAL_URL: http://api:3001
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  sfus_mysql_data:
